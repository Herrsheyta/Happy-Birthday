<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Surprise 🎉</title>
<style>
body {
  margin: 0;
  font-family: 'Cursive', Arial, sans-serif;
  overflow: hidden;
  text-align: center;
  height: 100vh;
  position: relative;
  background: linear-gradient(to bottom, #fce4ec, #ffe0f0, #ffd1dc);
  animation: bgGlow 10s ease-in-out infinite alternate;
}

/* Stars */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: twinkle 3s infinite alternate;
  z-index: 1;
}

/* Typewriter */
.typewriter {
  font-size: 28px;
  font-weight: bold;
  color: #d81b60;
  margin-bottom: 20px;
  min-height: 100px;
  position: relative;
  z-index: 10;
  text-shadow: 0 0 5px #ff85c0;
}

/* Password & Note */
#passwordSection, #noteContainer {
  margin-top: 20px;
  position: relative;
  z-index: 10;
}
#passwordSection { display: none; }

#noteContainer {
  display:none;
  font-size: 20px;
  color:#d81b60;
  font-weight:bold;
  line-height:1.6;
  max-width: 80%;
  margin: 20px auto;
  background: rgba(255, 255, 255, 0.1);
  padding: 20px;
  border-radius: 15px;
  overflow-y: auto;
  max-height: 60vh;
  text-align: center;
  text-shadow: 0 0 5px #ff85c0;
}

input {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}
button {
  padding: 8px 15px;
  border: none;
  border-radius: 5px;
  background: #d81b60;
  color: white;
  cursor: pointer;
}
button:hover { background: #c2185b; }
#error { color:red; display:none; margin-bottom:10px; }

/* Floating items */
.balloon, .heart, .confetti, .sparkle, .trail, .petal {
  position: absolute;
  pointer-events: none;
  z-index: 5;
  will-change: transform;
}

/* Balloons */
.balloon { border-radius: 50% 50% 50% 50%; width: 50px; height: 70px; opacity: 0.9; }

/* Hearts */
.heart {
  width: 25px;
  height: 25px;
  background: red;
  position: absolute;
  transform: scale(1);
  animation: pulse 2s infinite;
  box-shadow: 0 0 8px rgba(255,0,0,0.7);
}
.heart::before, .heart::after {
  content: "";
  position: absolute;
  width: 25px;
  height: 25px;
  background: red;
  border-radius: 50%;
}
.heart::before { top: -12.5px; left: 0; }
.heart::after { left: 12.5px; top: 0; }

/* Confetti & Sparkles */
.confetti { width: 8px; height: 8px; border-radius: 50%; opacity: 0.9; }
.sparkle, .trail { width: 6px; height: 6px; border-radius: 50%; background: gold; animation: sparkleAnim 1s ease-out forwards; }

/* Rose Petals */
.petal {
  width: 15px;
  height: 15px;
  background: radial-gradient(circle at 50% 50%, #ff4d6d, #d81b60);
  border-radius: 50% 50% 50% 50%;
  opacity: 0.8;
  transform: rotate(0deg);
}

/* Banner */
#bannerContainer {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
  display: none;
}

#birthdayBanner {
  font-size: 50px;
  font-weight: bold;
  color: #ff1e8c;
  text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff85c0, 0 0 30px #ff2d95;
  animation: floatBanner 3s ease-in-out infinite alternate, glowText 2s ease-in-out infinite alternate;
}

/* Animations */
@keyframes pulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 8px rgba(255,0,0,0.7);}
  50% { transform: scale(1.3); box-shadow: 0 0 15px rgba(255,0,0,1);}
}
@keyframes sparkleAnim { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
@keyframes twinkle { 0% { opacity: 0.2; } 50% { opacity: 0.8; } 100% { opacity: 0.2; } }
@keyframes bgGlow {
  0% { background: linear-gradient(to bottom, #fce4ec, #ffe0f0, #ffd1dc); }
  50% { background: linear-gradient(to bottom, #ffd1dc, #ffe0f0, #fce4ec); }
  100% { background: linear-gradient(to bottom, #fce4ec, #ffe0f0, #ffd1dc); }
}
@keyframes floatBanner {
  0% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-15px); }
  100% { transform: translateX(-50%) translateY(0); }
}
@keyframes glowText {
  0% { text-shadow: 0 0 10px #ff2d95, 0 0 20px #ff85c0, 0 0 30px #ff2d95; }
  50% { text-shadow: 0 0 20px #ff2d95, 0 0 40px #ff85c0, 0 0 60px #ff2d95; }
  100% { text-shadow: 0 0 10px #ff2d95, 0 0 20px #ff85c0, 0 0 30px #ff2d95; }
}
</style>
</head>
<body>

<div class="typewriter" id="typewriter"></div>

<div id="passwordSection">
  <p><strong>Question:</strong> Our first date? (DD-MM-YYYY)</p>
  <input type="password" id="password" placeholder="Type your answer here!">
  <br>
  <button onclick="checkPassword()">Unlock</button>
  <p id="error">Huhh, how can you even forget this??? 😢</p>
  <button id="retryBtn" onclick="retry()" style="display:none;">Retry</button>
</div>

<div id="noteContainer"></div>

<div id="bannerContainer">
  <h1 id="birthdayBanner">🎉Happy Birthday, My Love!💖🎉</h1>
</div>

<script>
// Typewriter intro
const messageLines=["Hey you... 🎉","Guess what? Today is YOUR day! 😘","I have a little surprise for you... 💖","But first... 🥰","Write the correct answer and unlock a beautiful surprise ahead! ✨💌"];
let i=0,j=0;
function typeWriter(){
  if(i>=messageLines.length){ document.getElementById('passwordSection').style.display='block'; return; }
  document.getElementById('typewriter').innerText = messageLines[i].substring(0,j+1);
  if(j<messageLines[i].length-1){ j++; setTimeout(typeWriter,70); }
  else { j=0; i++; setTimeout(typeWriter,700); }
}
typeWriter();

// Stars background
const stars=[];
for(let i=0;i<100;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.left=`${Math.random()*100}vw`;
  s.style.top=`${Math.random()*100}vh`;
  s.style.width=s.style.height=`${1+Math.random()*2}px`;
  document.body.appendChild(s);
  stars.push({el:s, speed:0.05+Math.random()*0.1});
}
function animateStars(){ stars.forEach(s=>{ let top=parseFloat(s.el.style.top); top+=s.speed; if(top>window.innerHeight) top=-2; s.el.style.top=top+'px'; }); requestAnimationFrame(animateStars);}
animateStars();

// Floating balloons & hearts
const floatingItems=[];
function createFloatingItems(className,count,sizeRange,speedRange,colors){
  for(let k=0;k<count;k++){
    const item=document.createElement('div');
    item.className=className;
    const size=sizeRange[0]+Math.random()*(sizeRange[1]-sizeRange[0]);
    item.style.width=className==='balloon'?`${size}px`:`${size}px`;
    item.style.height=className==='balloon'?`${size*1.4}px`:`${size}px`;
    item.style.left=`${Math.random()*100}vw`;
    item.style.top=`${window.innerHeight+Math.random()*500}px`;
    if(className==='balloon') item.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
    if(className==='heart') item.style.backgroundColor='red';
    document.body.appendChild(item);
    const speed=speedRange[0]+Math.random()*(speedRange[1]-speedRange[0]);
    floatingItems.push({el:item,speed:speed});
  }
}
const balloonColors=['#e91e63','#ff4081','#f50057','#ff80ab','#f48fb1','#ff1744','#ff8a80'];
createFloatingItems('balloon',12,[40,70],[0.4,0.8],balloonColors);
createFloatingItems('heart',18,[20,30],[0.3,0.6]);

function animateFloating(){
  floatingItems.forEach(obj=>{
    const el=obj.el;
    let top=parseFloat(el.style.top);
    top-=obj.speed;
    el.style.top=top+'px';
    el.style.left=parseFloat(el.style.left)+Math.sin(Date.now()/1000)*0.3+'vw';
    if(top+parseFloat(el.style.height)<0){
      el.style.top=(window.innerHeight+Math.random()*200)+'px';
      el.style.left=`${Math.random()*100}vw`;
    }
  });
  requestAnimationFrame(animateFloating);
}
animateFloating();

// Party Popper
function partyPopper(){
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=`${50 + (Math.random()-0.5)*100}vw`;
    c.style.top=`${50 + (Math.random()-0.5)*100}px`;
    const size=5+Math.random()*8;
    c.style.width=c.style.height=`${size}px`;
    c.style.backgroundColor=`hsl(${Math.random()*360},80%,70%)`;
    document.body.appendChild(c);
    const angle=Math.random()*2*Math.PI;
    const speed=2+Math.random()*4;
    let posX=parseFloat(c.style.left), posY=parseFloat(c.style.top);
    const confettiAnim=()=>{ posX+=Math.cos(angle)*speed; posY+=Math.sin(angle)*speed +1; c.style.left=posX+'vw'; c.style.top=posY+'px'; if(posY<window.innerHeight+50) requestAnimationFrame(confettiAnim); };
    confettiAnim();
  }
}

// Password check
function checkPassword(){
  const input=document.getElementById("password").value.trim();
  const correct="01-02-2025";
  if(input===correct){
    document.getElementById("passwordSection").style.display="none";
    document.getElementById("typewriter").style.display="none";
    partyPopper();
    showNoteLineByLine();
    startPetals(); // Start rose petals
  } else {
    document.getElementById("error").style.display="block";
    document.getElementById("retryBtn").style.display="inline-block";
  }
}
function retry(){
  document.getElementById("password").value="";
  document.getElementById("error").style.display="none";
  document.getElementById("retryBtn").style.display="none";
}

// Show note line by line
const noteLines = [
"I don’t know if three words could ever truly capture how I feel about you… So, maybe four words do it a little better: You are my universe 🌌✨. The dictionary says the universe is all of space, time, and their contents. In other words—the universe is everything. You are my everything 💖.",
"When you look up at the stars ✨, can you imagine their end? I imagine constellation after constellation, galaxy after galaxy 🌠—I cannot picture the sky ever coming to a point where the stars cease to exist. My love for you is the same ❤️. It continues on, endlessly ♾️.",
"Even the brightest stars fall from the sky 🌟; some explode 💥, some burn out 🔥. But amidst all of our explosions, shortcomings, and falling outs, I will still love you 💌—because out of all the things that fail in this life, love never does.",
"YOU ARE MY UNIVERSE 🌌. And even those four words cannot unravel the depths of my love for you 💕.",
"So today, on your birthday 🎂🎉, I just want to say: Thank you for being my universe, for filling my life with light, laughter 😄, and love ❤️. I can’t wait to celebrate you, hold you close 🤗, steal a few kisses 😘, and make you feel just how much you mean to me. Happy Birthday, my love 💖!"
];
function showNoteLineByLine(idx=0){
  const container=document.getElementById('noteContainer');
  if(idx>=noteLines.length){
    document.getElementById('bannerContainer').style.display='block';
    createSparklesAroundBanner();
    return;
  }
  const p=document.createElement('p');
  p.innerText=noteLines[idx];
  container.appendChild(p);
  container.style.display='block';
  setTimeout(()=>showNoteLineByLine(idx+1),2000);
}

// Sparkles around banner
function createSparklesAroundBanner(){
  setInterval(()=>{
    const sparkle=document.createElement('div');
    sparkle.className='sparkle';
    const bannerRect=document.getElementById('birthdayBanner').getBoundingClientRect();
    sparkle.style.left = bannerRect.left + Math.random()*bannerRect.width + 'px';
    sparkle.style.top = bannerRect.top + Math.random()*bannerRect.height + 'px';
    document.body.appendChild(sparkle);
    let scale=0;
    const anim=setInterval(()=>{
      scale += 0.05;
      sparkle.style.transform = `scale(${scale})`;
      sparkle.style.opacity = 1 - scale/2;
      if(scale>=2){ sparkle.remove(); clearInterval(anim); }
    },20);
  },200);
}

// Rose Petals
function startPetals(){
  setInterval(()=>{
    const petal=document.createElement('div');
    petal.className='petal';
    petal.style.left = Math.random()*100 + 'vw';
    petal.style.top = '-20px';
    document.body.appendChild(petal);
    let top=-20;
    const angle=Math.random()*2*Math.PI;
    const speed=1+Math.random()*2;
    const rotateSpeed=(Math.random()-0.5)*0.1;
    const anim=setInterval(()=>{
      top += speed;
      petal.style.top = top+'px';
      petal.style.left = parseFloat(petal.style.left)+Math.sin(Date.now()/500)*0.3+'vw';
      petal.style.transform = `rotate(${rotateSpeed*top*50}deg)`;
      if(top>window.innerHeight+20){ petal.remove(); clearInterval(anim);}
    },20);
  },300);
}
</script>
</body>
</html>
