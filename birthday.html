<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Surprise 🎉</title>
<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  overflow: hidden;
  text-align: center;
  height: 100vh;
  position: relative;
  background: linear-gradient(to bottom, #fce4ec, #ffe0f0);
  animation: bgGlow 8s ease-in-out infinite alternate;
}

/* Stars */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: twinkle 3s infinite alternate;
  z-index: 1;
}

/* Typewriter */
.typewriter {
  font-size: 28px;
  font-weight: bold;
  color: #e91e63;
  margin-bottom: 20px;
  min-height: 100px;
  position: relative;
  z-index: 10;
}

/* Password & Note */
#passwordSection, #noteContainer {
  margin-top: 20px;
  position: relative;
  z-index: 10;
}
#passwordSection { display: none; }

#noteContainer {
  display:none;
  font-size: 20px;
  color:#e91e63;
  font-weight:bold;
  line-height:1.6;
  max-width: 80%;
  margin: 20px auto;
  background: rgba(255, 255, 255, 0.1);
  padding: 20px;
  border-radius: 15px;
  overflow-y: auto;
  max-height: 60vh;
  text-align: center;
}

input {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}
button {
  padding: 8px 15px;
  border: none;
  border-radius: 5px;
  background: #e91e63;
  color: white;
  cursor: pointer;
}
button:hover { background: #d81b60; }
#error { color:red; display:none; margin-bottom:10px; }

/* Floating items */
.balloon, .heart, .confetti, .sparkle, .trail, .cakeHeart {
  position: absolute;
  pointer-events: none;
  z-index: 5;
  will-change: transform;
}

/* Balloons */
.balloon { border-radius: 50% 50% 50% 50%; width: 50px; height: 70px; opacity: 0.9; }

/* Hearts */
.heart, .cakeHeart {
  width: 25px;
  height: 25px;
  background: red;
  position: absolute;
  transform: scale(1);
  animation: pulse 2s infinite;
  box-shadow: 0 0 8px rgba(255,0,0,0.7);
}
.heart::before, .heart::after, .cakeHeart::before, .cakeHeart::after {
  content: "";
  position: absolute;
  width: 25px;
  height: 25px;
  background: red;
  border-radius: 50%;
}
.heart::before, .cakeHeart::before { top: -12.5px; left: 0; }
.heart::after, .cakeHeart::after { left: 12.5px; top: 0; }

/* Confetti & Sparkles */
.confetti { width: 8px; height: 8px; border-radius: 50%; opacity: 0.9; }
.sparkle, .trail { width: 6px; height: 6px; border-radius: 50%; background: gold; animation: sparkleAnim 1s ease-out forwards; }

/* Cake */
#cake {
  display:none;
  margin:30px auto 0 auto;
  width:140px;
  height:180px;
  position: relative;
}
#cake .layer {
  width: 100%;
  height: 40px;
  background: pink;
  border-radius: 10px 10px 0 0;
  margin-bottom: 4px;
  position: relative;
}
#cake .frosting {
  width: 100%;
  height: 10px;
  background: #fff;
  position: absolute;
  top:-10px;
  border-radius:10px 10px 0 0;
}
#cake .candle {
  width: 6px;
  height: 25px;
  background: yellow;
  position: absolute;
  top:-35px;
  left:50%;
  transform:translateX(-50%);
  border-radius:3px;
}
#cake .flame {
  width: 8px;
  height: 12px;
  background: orange;
  position: absolute;
  top:-12px;
  left:-1px;
  border-radius:50%;
  animation: flicker 0.3s infinite alternate;
}

/* Animations */
@keyframes pulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 8px rgba(255,0,0,0.7);}
  50% { transform: scale(1.3); box-shadow: 0 0 15px rgba(255,0,0,1);}
}
@keyframes sparkleAnim { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
@keyframes twinkle { 0% { opacity: 0.2; } 50% { opacity: 0.8; } 100% { opacity: 0.2; } }
@keyframes bgGlow {
  0% { background: linear-gradient(to bottom, #fce4ec, #ffe0f0); }
  50% { background: linear-gradient(to bottom, #ffe0f0, #fce4ec); }
  100% { background: linear-gradient(to bottom, #fce4ec, #ffe0f0); }
}
@keyframes flicker {
  0% { transform: translateX(-50%) scaleY(1); opacity:1; }
  100% { transform: translateX(-50%) scaleY(1.2); opacity:0.8; }
}
</style>
</head>
<body>

<div class="typewriter" id="typewriter"></div>

<div id="passwordSection">
  <p><strong>Question:</strong> Our first date? (DD-MM-YYYY)</p>
  <input type="password" id="password" placeholder="Type your answer here!">
  <br>
  <button onclick="checkPassword()">Unlock</button>
  <p id="error">Huhh, how can you even forget this??? 😢</p>
  <button id="retryBtn" onclick="retry()" style="display:none;">Retry</button>
</div>

<div id="noteContainer"></div>

<div id="cake">
  <div class="layer"><div class="frosting"></div></div>
  <div class="layer"><div class="frosting"></div></div>
  <div class="layer"><div class="frosting"></div></div>
  <div class="candle"><div class="flame"></div></div>
</div>

<script>
// Typewriter intro
const messageLines=["Hey you... 🎉","Guess what? Today is YOUR day! 😘","I have a little surprise for you... 💖","But first... 🥰","Write the correct answer and unlock a beautiful surprise ahead! ✨💌"];
let i=0,j=0;
function typeWriter(){
  if(i>=messageLines.length){ document.getElementById('passwordSection').style.display='block'; return; }
  document.getElementById('typewriter').innerText = messageLines[i].substring(0,j+1);
  if(j<messageLines[i].length-1){ j++; setTimeout(typeWriter,70); }
  else { j=0; i++; setTimeout(typeWriter,700); }
}
typeWriter();

// Stars background
const stars=[];
for(let i=0;i<100;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.left=`${Math.random()*100}vw`;
  s.style.top=`${Math.random()*100}vh`;
  s.style.width=s.style.height=`${1+Math.random()*2}px`;
  document.body.appendChild(s);
  stars.push({el:s, speed:0.05+Math.random()*0.1});
}
function animateStars(){ stars.forEach(s=>{ let top=parseFloat(s.el.style.top); top+=s.speed; if(top>window.innerHeight) top=-2; s.el.style.top=top+'px'; }); requestAnimationFrame(animateStars);}
animateStars();

// Floating balloons & hearts
const floatingItems=[];
function createFloatingItems(className,count,sizeRange,speedRange,colors){
  for(let k=0;k<count;k++){
    const item=document.createElement('div');
    item.className=className;
    const size=sizeRange[0]+Math.random()*(sizeRange[1]-sizeRange[0]);
    item.style.width=className==='balloon'?`${size}px`:`${size}px`;
    item.style.height=className==='balloon'?`${size*1.4}px`:`${size}px`;
    item.style.left=`${Math.random()*100}vw`;
    item.style.top=`${window.innerHeight+Math.random()*500}px`;
    if(className==='balloon') item.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
    if(className==='heart') item.style.backgroundColor='red';
    document.body.appendChild(item);
    const speed=speedRange[0]+Math.random()*(speedRange[1]-speedRange[0]);
    floatingItems.push({el:item,speed:speed});
  }
}
const balloonColors=['#e91e63','#ff4081','#f50057','#ff80ab','#f48fb1','#ff1744','#ff8a80'];
createFloatingItems('balloon',12,[40,70],[0.4,0.8],balloonColors);
createFloatingItems('heart',18,[20,30],[0.3,0.6]);

function animateFloating(){
  floatingItems.forEach(obj=>{
    const el=obj.el;
    let top=parseFloat(el.style.top);
    top-=obj.speed;
    el.style.top=top+'px';
    el.style.left=parseFloat(el.style.left)+Math.sin(Date.now()/1000)*0.3+'vw';
    if(top+parseFloat(el.style.height)<0){
      el.style.top=(window.innerHeight+Math.random()*200)+'px';
      el.style.left=`${Math.random()*100}vw`;
    }
  });
  requestAnimationFrame(animateFloating);
}
animateFloating();

// Party Popper
function partyPopper(){
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=`${50 + (Math.random()-0.5)*100}vw`;
    c.style.top=`${50 + (Math.random()-0.5)*100}px`;
    const size=5+Math.random()*8;
    c.style.width=c.style.height=`${size}px`;
    c.style.backgroundColor=`hsl(${Math.random()*360},80%,70%)`;
    document.body.appendChild(c);
    const angle=Math.random()*2*Math.PI;
    const speed=2+Math.random()*4;
    let posX=parseFloat(c.style.left), posY=parseFloat(c.style.top);
    const confettiAnim=()=>{ posX+=Math.cos(angle)*speed; posY+=Math.sin(angle)*speed +1; c.style.left=posX+'vw'; c.style.top=posY+'px'; if(posY<window.innerHeight+50) requestAnimationFrame(confettiAnim); };
    confettiAnim();
  }
}

// Password check
function checkPassword(){
  const input=document.getElementById("password").value.trim();
  const correct="01-02-2025";
  if(input===correct){
    document.getElementById("passwordSection").style.display="none";
    document.getElementById("typewriter").style.display="none";
    partyPopper();
    showNoteLineByLine();
  } else {
    document.getElementById("error").style.display="block";
    document.getElementById("retryBtn").style.display="inline-block";
  }
}
function retry(){
  document.getElementById("password").value="";
  document.getElementById("error").style.display="none";
  document.getElementById("retryBtn").style.display="none";
}

// Show note line by line
const noteLines = [
"I don’t know if three words could ever truly capture how I feel about you… so maybe four words do it a little better: You are my universe 🌌✨. The dictionary says the universe is all of space, time, and their contents. In other words—the universe is everything. You are my everything 💖.",
"When you look up at the stars ✨, can you imagine their end? I imagine constellation after constellation, galaxy after galaxy 🌠—I cannot picture the sky ever coming to a point where the stars cease to exist. My love for you is the same ❤️. It continues on, endlessly ♾️.",
"Even the brightest stars fall from the sky 🌟; some explode 💥, some burn out 🔥. But amidst all of our explosions, shortcomings, and falling outs, I will still love you 💌—because out of all the things that fail in this life, love never does.",
"YOU ARE MY UNIVERSE 🌌. And even those four words cannot unravel the depths of my love for you 💕.",
"So today, on your birthday 🎂🎉, I just want to say: Thank you for being my universe, for filling my life with light, laughter 😄, and love ❤️. I can’t wait to celebrate you, hold you close 🤗, steal a few kisses 😘, and make you feel just how much you mean to me. Happy Birthday, my love 💖!"
];
function showNoteLineByLine(idx=0){
  const container=document.getElementById('noteContainer');
  if(idx>=noteLines.length){
    document.getElementById('cake').style.display='block';
    animateCakeHearts();
    return;
  }
  const p=document.createElement('p');
  p.innerText=noteLines[idx];
  container.appendChild(p);
  container.style.display='block';
  setTimeout(()=>showNoteLineByLine(idx+1),2000);
}

// Hearts rising from cake flame
function animateCakeHearts(){
  setInterval(()=>{
    const heart=document.createElement('div');
    heart.className='cakeHeart';
    const cakeRect=document.getElementById('cake').getBoundingClientRect();
    heart.style.left = cakeRect.left + cakeRect.width/2 - 12 + 'px';
    heart.style.top = cakeRect.top - 20 + 'px';
    document.body.appendChild(heart);
    let top=parseFloat(heart.style.top);
    const anim=setInterval(()=>{
      top-=1;
      heart.style.top=top+'px';
      heart.style.left=parseFloat(heart.style.left)+Math.sin(Date.now()/200)*0.5+'px';
      if(top<0){ heart.remove(); clearInterval(anim); }
    },20);
  },300);
}
</script>
</body>
</html>
